<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
  <link rel="stylesheet" href="../el-plus-theme.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { font-family: var(--el-font-family); font-size: 14px; color: var(--el-color-text-800); padding: 24px; background: transparent; }
    .demo-section { margin-bottom: 32px; }
    .demo-section:last-child { margin-bottom: 0; }
    .demo-label { font-size: 13px; color: var(--el-color-text-700); margin-top: 8px; }
    .demo-title { font-size: 13px; font-weight: 600; color: var(--el-color-text-900); margin: 0 0 12px; }
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/element-plus/dist/index.full.min.js"></script>
  <script src="https://unpkg.com/@element-plus/icons-vue/dist/index.iife.min.js"></script>
  <script>
    const { createApp } = Vue
    const app = createApp({
      setup() {
        function showSuccess() {
          ElementPlus.ElMessage({ message: '操作成功', type: 'success' })
        }
        function showWarning() {
          ElementPlus.ElMessage({ message: '请注意，该操作不可逆', type: 'warning' })
        }
        function showError() {
          ElementPlus.ElMessage({ message: '操作失败，请稍后重试', type: 'error' })
        }
        function showInfo() {
          ElementPlus.ElMessage({ message: '这是一条普通提示信息', type: 'info' })
        }
        function showClose() {
          ElementPlus.ElMessage({ message: '这条消息可手动关闭', type: 'success', showClose: true, duration: 0 })
        }
        function showLong() {
          ElementPlus.ElMessage({
            message: '任务已提交，系统将在后台处理，预计 1-3 分钟完成',
            type: 'info',
            showClose: true,
            duration: 5000
          })
        }
        return { showSuccess, showWarning, showError, showInfo, showClose, showLong }
      },
      template: `
        <div>
          <div class="demo-section">
            <p class="demo-title">基础用法</p>
            <div class="btn-row">
              <el-button type="primary" @click="showSuccess">成功</el-button>
              <el-button @click="showWarning" style="--el-button-bg-color:var(--el-color-warning-400); --el-button-border-color:var(--el-color-warning-400); --el-button-hover-bg-color:var(--el-color-warning-300); --el-button-hover-border-color:var(--el-color-warning-300); color:#fff;">警告</el-button>
              <el-button @click="showError" style="--el-button-bg-color:var(--el-color-danger-400); --el-button-border-color:var(--el-color-danger-400); --el-button-hover-bg-color:var(--el-color-danger-300); --el-button-hover-border-color:var(--el-color-danger-300); color:#fff;">错误</el-button>
              <el-button @click="showInfo">普通</el-button>
            </div>
            <p class="demo-label">四种消息类型：success / warning / error / info，从顶部居中弹出，3 秒后自动消失。</p>
          </div>
          <div class="demo-section">
            <p class="demo-title">可关闭</p>
            <el-button type="primary" @click="showClose">显示可关闭消息</el-button>
            <p class="demo-label">showClose: true 显示关闭按钮，duration: 0 不自动关闭，需手动点击 × 关闭。</p>
          </div>
          <div class="demo-section">
            <p class="demo-title">自定义时长</p>
            <el-button type="primary" @click="showLong">显示 5 秒消息</el-button>
            <p class="demo-label">通过 duration 控制显示时长（毫秒），默认 3000ms，适合内容较长的提示。</p>
          </div>
        </div>
      `
    })
    app.use(ElementPlus)
    for (const [key, component] of Object.entries(ElementPlusIconsVue)) {
      app.component(key, component)
    }
    app.mount('#app')
    window.addEventListener('load', () => {
      setTimeout(() => parent.postMessage({ height: document.body.scrollHeight }, '*'), 100)
    })
  </script>
</body>
</html>
