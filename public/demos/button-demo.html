<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
  <link rel="stylesheet" href="../el-plus-theme.css" />
  <style>
    body { margin: 0; padding: 16px 20px 32px; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #fff; }

    /* ── 自定义按钮变体（与 el-plus-theme.css 同步） ── */
    .btn-filled.el-button {
      --el-button-bg-color:              var(--el-color-text-100);
      --el-button-text-color:            var(--el-color-text-800);
      --el-button-border-color:          transparent;
      --el-button-hover-bg-color:        var(--el-color-text-300);
      --el-button-hover-text-color:      var(--el-color-text-800);
      --el-button-hover-border-color:    transparent;
      --el-button-active-bg-color:       var(--el-color-text-400);
      --el-button-active-text-color:     var(--el-color-text-800);
      --el-button-active-border-color:   transparent;
      --el-button-disabled-bg-color:     var(--el-color-text-100);
      --el-button-disabled-text-color:   var(--el-color-text-500);
      --el-button-disabled-border-color: transparent;
    }
    .btn-ghost.el-button {
      --el-button-bg-color:              var(--el-color-text-0);
      --el-button-text-color:            var(--el-color-text-800);
      --el-button-border-color:          var(--el-color-text-400);
      --el-button-hover-bg-color:        var(--el-color-primary-100);
      --el-button-hover-text-color:      var(--el-color-primary-600);
      --el-button-hover-border-color:    var(--el-color-primary-400);
      --el-button-active-bg-color:       var(--el-color-primary-200);
      --el-button-active-text-color:     var(--el-color-primary-600);
      --el-button-active-border-color:   var(--el-color-primary-600);
      --el-button-disabled-bg-color:     var(--el-color-text-0);
      --el-button-disabled-text-color:   var(--el-color-text-500);
      --el-button-disabled-border-color: var(--el-color-text-400);
    }
    .link-secondary {
      --el-link-text-color:          var(--el-color-text-800);
      --el-link-hover-text-color:    var(--el-color-primary-600);
      --el-link-disabled-text-color: var(--el-color-text-500);
    }
    .link-always-underline .el-link__inner { border-bottom: 1px solid; }

    /* ── 大分类标题 ── */
    .category-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 32px 0 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--el-color-primary-400);
    }
    .category-header:first-child { margin-top: 0; }
    .category-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px; height: 28px;
      background: var(--el-color-primary-600);
      color: #fff;
      border-radius: 50%;
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .category-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--el-color-text-1000);
    }
    .category-desc {
      font-size: 13px;
      color: var(--el-color-text-700);
      margin-left: auto;
    }

    /* ── 单个按钮类型区块 ── */
    .demo-section { margin-bottom: 32px; }
    .demo-section h3 { font-size: 14px; font-weight: 600; color: var(--el-color-text-900); margin: 0 0 4px; }
    .demo-section p  { font-size: 12px; color: var(--el-color-text-700); margin: 0 0 10px; }

    /* 交互预览条：实色按钮用浅主色背景，文字/链接按钮用白色背景 */
    .btn-preview {
      display: flex; align-items: center; flex-wrap: wrap; gap: 12px;
      padding: 14px 16px;
      border: 1px solid var(--el-color-text-300);
      border-radius: 6px 6px 0 0;
    }
    .btn-preview.bg-primary { background: var(--el-color-primary-100); }
    .btn-preview.bg-white   { background: #fff; }
    .preview-label { font-size: 11px; color: var(--el-color-text-700); flex-shrink: 0; }

    /* 四格状态网格 */
    .state-grid {
      display: grid; grid-template-columns: repeat(4, 1fr);
      border: 1px solid var(--el-color-text-300); border-top: none;
      border-radius: 0 0 6px 6px; overflow: hidden;
    }
    .state-cell {
      padding: 12px; background: #fff;
      border-right: 1px solid var(--el-color-text-300);
    }
    .state-cell:last-child { border-right: none; }
    .swatch-btn {
      display: flex; align-items: center; justify-content: center;
      height: 36px; padding: 0 12px; border-radius: 4px;
      font-size: 13px; white-space: nowrap; box-sizing: border-box;
      width: 100%; margin-bottom: 8px;
    }
    .swatch-text {
      display: inline-flex; align-items: center;
      height: 36px; padding: 0 2px;
      font-size: 14px; margin-bottom: 8px;
    }
    .swatch-link {
      font-size: 14px; display: block;
      min-height: 28px; line-height: 28px; margin-bottom: 8px;
    }
    .state-label { font-size: 11px; font-weight: 700; color: var(--el-color-text-1000); margin-bottom: 5px; }
    .token-row   { display: flex; justify-content: space-between; gap: 4px; margin-bottom: 2px; }
    .token-name  { font-size: 10px; color: var(--el-color-text-700); flex-shrink: 0; }
    .token-val   { font-size: 9px; color: var(--el-color-primary-600); background: var(--el-color-primary-200); padding: 1px 4px; border-radius: 2px; word-break: break-all; text-align: right; }
    .code-hint   { margin-top: 6px; padding: 8px 12px; background: var(--el-color-text-100); border-radius: 4px; font-family: monospace; font-size: 12px; color: var(--el-color-text-800); }

    /* 链接小标题 */
    .sub-title { font-size: 12px; font-weight: 600; color: var(--el-color-text-800); margin: 14px 0 8px; }
  </style>
</head>
