<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
  <link rel="stylesheet" href="../el-plus-theme.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { font-family: var(--el-font-family); font-size: 14px; color: var(--el-color-text-800); padding: 24px; background: transparent; }
    .demo-section { margin-bottom: 32px; }
    .demo-section:last-child { margin-bottom: 0; }
    .demo-label { font-size: 13px; color: var(--el-color-text-700); margin-top: 8px; }
    .demo-title { font-size: 13px; font-weight: 600; color: var(--el-color-text-900); margin: 0 0 12px; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/element-plus/dist/index.full.min.js"></script>
  <script src="https://unpkg.com/@element-plus/icons-vue/dist/index.iife.min.js"></script>
  <script>
    const { createApp, ref } = Vue
    const app = createApp({
      setup() {
        const visible1 = ref(false)
        const visible2 = ref(false)
        const visible3 = ref(false)
        const visible4 = ref(false)
        return { visible1, visible2, visible3, visible4 }
      },
      template: `
        <div>
          <div class="demo-section">
            <p class="demo-title">480px — 确认 / 简单表单</p>
            <el-button type="primary" @click="visible1 = true">打开 480px 弹窗</el-button>
            <p class="demo-label">适用于二次确认、短表单（1-3 个字段）。</p>
          </div>
          <div class="demo-section">
            <p class="demo-title">720px — 标准表单 / 详情</p>
            <el-button type="primary" @click="visible2 = true">打开 720px 弹窗</el-button>
            <p class="demo-label">适用于标准新建/编辑表单（4-8 个字段）或详情展示。</p>
          </div>
          <div class="demo-section">
            <p class="demo-title">960px — 复杂表单 / 大内容</p>
            <el-button @click="visible3 = true">打开 960px 弹窗</el-button>
            <p class="demo-label">适用于复杂表单（多分组字段）或需要展示大量内容的详情弹窗。</p>
          </div>
          <div class="demo-section">
            <p class="demo-title">危险操作二次确认</p>
            <el-button type="danger" @click="visible4 = true">删除操作</el-button>
            <p class="demo-label">危险操作使用 480px 弹窗，主按钮为 danger 红色。</p>
          </div>

          <el-dialog v-model="visible1" title="新建标签" width="480px">
            <el-form label-width="80px">
              <el-form-item label="标签名称" required>
                <el-input placeholder="请输入标签名称" />
              </el-form-item>
              <el-form-item label="标签颜色">
                <el-select placeholder="请选择颜色" style="width:100%;">
                  <el-option label="蓝色" value="blue" />
                  <el-option label="绿色" value="green" />
                  <el-option label="红色" value="red" />
                </el-select>
              </el-form-item>
            </el-form>
            <template #footer>
              <el-button @click="visible1 = false">取消</el-button>
              <el-button type="primary" @click="visible1 = false">确认新建</el-button>
            </template>
          </el-dialog>

          <el-dialog v-model="visible2" title="新建成员" width="720px">
            <el-form label-width="90px">
              <el-form-item label="姓名" required>
                <el-input placeholder="请输入姓名" />
              </el-form-item>
              <el-form-item label="所属部门" required>
                <el-select placeholder="请选择部门" style="width:100%;">
                  <el-option label="产品部" value="product" />
                  <el-option label="技术部" value="tech" />
                  <el-option label="设计部" value="design" />
                </el-select>
              </el-form-item>
              <el-form-item label="邮箱">
                <el-input placeholder="请输入邮箱" />
              </el-form-item>
              <el-form-item label="手机号">
                <el-input placeholder="请输入手机号" />
              </el-form-item>
            </el-form>
            <template #footer>
              <el-button @click="visible2 = false">取消</el-button>
              <el-button type="primary" @click="visible2 = false">确认新建</el-button>
            </template>
          </el-dialog>

          <el-dialog v-model="visible3" title="记录详情" width="960px">
            <el-descriptions :column="3" border>
              <el-descriptions-item label="姓名">张三</el-descriptions-item>
              <el-descriptions-item label="工号">EMP-1001</el-descriptions-item>
              <el-descriptions-item label="部门">产品部</el-descriptions-item>
              <el-descriptions-item label="职级">P7</el-descriptions-item>
              <el-descriptions-item label="入职日期">2024-01-15</el-descriptions-item>
              <el-descriptions-item label="状态"><el-tag type="success" effect="light">在职</el-tag></el-descriptions-item>
              <el-descriptions-item label="邮箱" :span="2">zhangsan@company.com</el-descriptions-item>
              <el-descriptions-item label="手机">138-0000-0000</el-descriptions-item>
              <el-descriptions-item label="备注" :span="3">该员工为核心技术骨干，需保留关键权限。</el-descriptions-item>
            </el-descriptions>
            <template #footer>
              <el-button type="primary" @click="visible3 = false">关闭</el-button>
            </template>
          </el-dialog>

          <el-dialog v-model="visible4" title="确认删除" width="480px">
            <div style="display:flex; gap:16px; align-items:flex-start;">
              <el-icon style="color:var(--el-color-danger-400); font-size:22px; flex-shrink:0; margin-top:2px;"><WarningFilled /></el-icon>
              <div>
                <p style="font-size:14px; color:var(--el-color-text-1000); font-weight:500; margin:0 0 8px;">确认要删除该记录吗？</p>
                <p style="font-size:13px; color:var(--el-color-text-700); margin:0; line-height:1.6;">删除后数据将无法恢复，请谨慎操作。</p>
              </div>
            </div>
            <template #footer>
              <el-button @click="visible4 = false">取消</el-button>
              <el-button type="danger" @click="visible4 = false">确认删除</el-button>
            </template>
          </el-dialog>
        </div>
      `
    })
    app.use(ElementPlus)
    for (const [key, component] of Object.entries(ElementPlusIconsVue)) {
      app.component(key, component)
    }
    app.mount('#app')
    window.addEventListener('load', () => {
      setTimeout(() => parent.postMessage({ height: document.body.scrollHeight }, '*'), 100)
    })
  </script>
</body>
</html>
