<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
  <link rel="stylesheet" href="../el-plus-theme.css" />
  <style>
    body { margin: 0; padding: 16px 20px 24px; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #fff; }
    .demo-section { margin-bottom: 28px; }
    .demo-section:last-child { margin-bottom: 0; }
    .demo-title { font-size: 13px; font-weight: 600; color: var(--el-color-text-900); margin: 0 0 12px; }
    .demo-label { font-size: 12px; color: var(--el-color-text-700); margin-top: 10px; }
    .demo-row   { display: flex; gap: 24px; align-items: center; flex-wrap: wrap; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/element-plus/dist/index.full.min.js"></script>
  <script src="https://unpkg.com/@element-plus/icons-vue/dist/index.iife.min.js"></script>
  <script>
    const { createApp } = Vue
    const app = createApp({
      setup() { return {} },
      template: `
        <div>

          <!-- 数字徽章 -->
          <div class="demo-section">
            <p class="demo-title">数字徽章</p>
            <div class="demo-row">
              <el-badge :value="12">
                <el-button>消息</el-button>
              </el-badge>
              <el-badge :value="3" type="primary">
                <el-button>通知</el-button>
              </el-badge>
              <el-badge :value="99" type="warning">
                <el-button>待办</el-button>
              </el-badge>
              <el-badge :value="5" type="success">
                <el-button>已处理</el-button>
              </el-badge>
            </div>
            <p class="demo-label">:value 绑定数字，默认红色（--el-color-danger），也可通过 type 切换颜色。</p>
          </div>

          <!-- 最大数值 -->
          <div class="demo-section">
            <p class="demo-title">最大数值限制</p>
            <div class="demo-row">
              <el-badge :value="200" :max="99">
                <el-button>消息（max=99）</el-button>
              </el-badge>
              <el-badge :value="9999" :max="999">
                <el-button>通知（max=999）</el-button>
              </el-badge>
            </div>
            <p class="demo-label">:max 设置最大显示数字，超出显示为 max+（如 99+）。推荐 :max="99"。</p>
          </div>

          <!-- 状态小圆点 -->
          <div class="demo-section">
            <p class="demo-title">状态小圆点</p>
            <div class="demo-row">
              <el-badge is-dot>
                <el-button>有新消息</el-button>
              </el-badge>
              <el-badge is-dot type="success">
                <el-button>在线</el-button>
              </el-badge>
              <el-badge is-dot type="warning">
                <el-button>忙碌</el-button>
              </el-badge>
              <el-badge is-dot type="danger">
                <el-button>离线</el-button>
              </el-badge>
            </div>
            <p class="demo-label">is-dot 仅显示小圆点，无数字，用于简单有/无提示场景。</p>
          </div>

          <!-- 文字内容 -->
          <div class="demo-section">
            <p class="demo-title">文字内容</p>
            <div class="demo-row">
              <el-badge value="新">
                <el-button>新功能</el-button>
              </el-badge>
              <el-badge value="Hot" type="danger">
                <el-button>热门</el-button>
              </el-badge>
              <el-badge value="Beta" type="warning">
                <el-button>测试中</el-button>
              </el-badge>
            </div>
            <p class="demo-label">value 可以是文字字符串，用于特殊标注。</p>
          </div>

        </div>
      `
    })
    app.use(ElementPlus)
    Object.entries(ElementPlusIconsVue).forEach(([name, comp]) => app.component(name, comp))
    app.mount('#app')

    function sendHeight() {
      window.parent.postMessage({ type: 'iframe-height', height: document.documentElement.scrollHeight }, '*')
    }
    window.addEventListener('load', sendHeight)
    new MutationObserver(sendHeight).observe(document.body, { subtree: true, childList: true, attributes: true })
  </script>
</body>
</html>
